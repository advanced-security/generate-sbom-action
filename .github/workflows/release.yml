name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create, for example v1.2'
        required: true
        type: string
      update_major_tag:
        description: 'Move the major version tag (for example v1) to this release'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Node.js 24.x
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 24.x

      - name: Install dependencies
        run: npm ci

      - name: Verify build
        run: |
          npm run build
          npm run format-check
          npm run lint
          npm run package
          npm test

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+(\.[0-9]+)+$ ]]; then
            echo "Release tag must match v<major>.<minor>[.<patch>], for example v1.2"
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null; then
            echo "Release tag $RELEASE_TAG already exists"
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: gh release create "$RELEASE_TAG" --target "$GITHUB_SHA" --title "$RELEASE_TAG" --generate-notes

      - name: Update major version tag
        if: ${{ inputs.update_major_tag }}
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          MAJOR_TAG="${RELEASE_TAG%%.*}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --force "$MAJOR_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$MAJOR_TAG" --force
